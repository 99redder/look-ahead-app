<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Look Ahead Planner</title>
  <meta name="theme-color" content="#020603" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="modal-backdrop" class="modal-backdrop" style="display:none;" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h3 id="modal-title" class="modal-title">Edit</h3>
      <p id="modal-message" class="modal-message"></p>
      <input id="modal-input" class="modal-input" type="text" />
      <div class="modal-actions">
        <button id="modal-cancel" type="button">Cancel</button>
        <button id="modal-save" type="button">Save</button>
      </div>
    </div>
  </div>

  <main id="app" class="app">
    <header class="top">
      <h1>Look Ahead</h1>
      <span class="sync-pill" id="sync-pill">Local only</span>
    </header>


    <section>
      <div class="calendar-head">
        <div class="section-title" style="margin:0;">Look Ahead Calendar</div>
        <div class="cal-nav">
          <button id="cal-prev" type="button">←</button>
          <div id="cal-label" class="cal-label"></div>
          <button id="cal-next" type="button">→</button>
        </div>
      </div>
      <div id="calendar-grid" class="calendar-grid"></div>
    </section>

  </main>

  <script src="app.js?v=202603030930"></script>
</body>
</html>
