<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Look Ahead Planner</title>
  <meta name="theme-color" content="#020603" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="pwa-icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="pwa-icon-512.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="pwa-icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="pwa-icon-512.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css?v=202604011858" />
</head>
<body>
  <div id="modal-backdrop" class="modal-backdrop" style="display:none;" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h3 id="modal-title" class="modal-title">Edit</h3>
      <p id="modal-message" class="modal-message"></p>
      <input id="modal-input" class="modal-input" type="text" />
      <input id="modal-time" class="modal-input" type="text" maxlength="4" placeholder="Time (HHMM, e.g. 0800)" />
      <select id="modal-category" class="modal-input" style="display:none;"></select>
      <div id="modal-color-wrap" class="modal-color-wrap hidden" aria-label="Category color">
        <div id="modal-color-palette" class="modal-color-palette"></div>
      </div>
      <textarea id="modal-notes" class="modal-notes" rows="6" style="display:none;" placeholder="Notes (only visible in this modal)"></textarea>
      <div class="modal-actions">
        <button id="modal-delete" type="button" style="color:#ff9b9b;border-color:#5a2222;margin-right:auto;">Delete</button>
        <button id="modal-cancel" type="button">Cancel</button>
        <button id="modal-save" type="button">Save</button>
      </div>
    </div>
  </div>

  <main id="app" class="app">
    <header class="top">
      <div class="top-main">
        <div class="brand-block">
          <h1 class="brand"><img src="logo-look-ahead.svg" alt="Look Ahead Planner" class="brand-logo" /></h1>

          <button id="cal-focus" type="button" class="focus-toggle">FOCUS</button>

          <section id="category-bar" class="category-bar category-bar-inline">
            <div class="category-bar-head">
              <div class="section-title">Categories</div>
              <button id="category-manage" type="button">Manage</button>
            </div>
            <div id="category-list" class="category-list"></div>
          </section>
        </div>
        <div class="header-actions">
          <span class="sync-pill" id="sync-pill">Local only</span>
        </div>
      </div>
    </header>

    <section>
      <div class="calendar-head">
        <div class="cal-nav">
          <button id="cal-prev" type="button">←</button>
          <div id="cal-label" class="cal-label"></div>
          <button id="cal-next" type="button">→</button>
        </div>
      </div>
      <div id="calendar-grid" class="calendar-grid"></div>
    </section>

  </main>

  <!-- Delete Confirm Modal -->
  <div id="delete-modal" class="modal-backdrop" style="display:none;" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
      <h3 id="delete-modal-title" class="modal-title">Delete Task</h3>
      <p id="delete-modal-message" class="modal-message">Are you sure you want to delete this task?</p>
      <div class="modal-actions">
        <button id="delete-modal-cancel" type="button">Cancel</button>
        <button id="delete-modal-confirm" type="button" style="background:#5a2222;border-color:#5a2222;color:#ff9b9b;">Delete</button>
      </div>
    </div>
  </div>

  <div id="category-modal" class="modal-backdrop" style="display:none;" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="category-modal-title">
      <h3 id="category-modal-title" class="modal-title">Category</h3>
      <p id="category-modal-message" class="modal-message"></p>
      <input id="category-modal-input" class="modal-input" type="text" placeholder="Category name" />
      <div class="modal-color-wrap">
        <div id="category-modal-palette" class="modal-color-palette"></div>
      </div>
      <div class="modal-actions">
        <button id="category-modal-delete" type="button" style="display:none;color:#ff9b9b;border-color:#5a2222;margin-right:auto;">Delete</button>
        <button id="category-modal-cancel" type="button">Cancel</button>
        <button id="category-modal-save" type="button">Save</button>
      </div>
    </div>
  </div>

  <div id="category-delete-modal" class="modal-backdrop" style="display:none;" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="category-delete-modal-title">
      <h3 id="category-delete-modal-title" class="modal-title">Delete Category</h3>
      <p id="category-delete-modal-message" class="modal-message">Delete this category? Tasks in it will move to Uncategorized.</p>
      <div class="modal-actions">
        <button id="category-delete-modal-cancel" type="button">Keep Category</button>
        <button id="category-delete-modal-confirm" type="button" style="background:#5a2222;border-color:#5a2222;color:#ff9b9b;">Move Tasks & Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=202604011845"></script>
</body>
</html>
