<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1410"/>
      <stop offset="100%" stop-color="#1a2e22"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#2db84d"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#bg)"/>
  
  <!-- Arrow forward -->
  <g filter="url(#glow)">
    <path d="M32 48 L68 84 L68 64 L88 64 L88 76 L68 76 L68 56 Z" fill="url(#grad)"/>
    <circle cx="88" cy="48" r="5" fill="#39FF14"/>
    <!-- Ring -->
    <circle cx="60" cy="60" r="42" stroke="url(#grad)" stroke-width="4" fill="none" opacity="0.5"/>
  </g>
</svg>
