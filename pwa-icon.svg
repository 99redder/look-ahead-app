<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1410"/>
      <stop offset="100%" stop-color="#1a2e22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#2db84d"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Arrow forward icon -->
  <g filter="url(#glow)">
    <!-- Main arrow -->
    <path d="M140 170 L280 310 L280 230 L380 230 L380 282 L280 282 L280 202 Z" fill="url(#accent)"/>
    <!-- Circle around arrow -->
    <circle cx="256" cy="256" r="180" stroke="url(#accent)" stroke-width="16" fill="none" opacity="0.6"/>
  </g>
</svg>
