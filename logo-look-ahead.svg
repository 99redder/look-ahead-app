<svg width="900" height="180" viewBox="0 0 900 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Look Ahead logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#FF4FD8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <rect x="24" y="34" width="112" height="112" rx="18" stroke="url(#g)" stroke-width="6" fill="rgba(0,0,0,0.25)"/>
    <path d="M52 103L78 77L96 93L120 67" stroke="url(#g)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="120" cy="67" r="7" fill="#39FF14"/>
  </g>

  <text x="170" y="92" fill="url(#g)" font-size="66" font-family="Inter, Arial, sans-serif" font-weight="800" letter-spacing="1.5">LOOK AHEAD</text>
  <text x="172" y="128" fill="#B6FFAC" opacity="0.9" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="600" letter-spacing="3">PLANNER</text>
</svg>
