<svg width="400" height="80" viewBox="0 0 400 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="50%" stop-color="#7DFF63"/>
      <stop offset="100%" stop-color="#39FF14"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="4" y="4" width="72" height="72" rx="14" stroke="url(#grad)" stroke-width="3" fill="rgba(13,20,16,0.9)" filter="url(#glow)"/>
  
  <!-- Arrow forward -->
  <path d="M24 56 L50 30 L50 44 L62 44 L62 50 L50 50 L50 64 Z" fill="url(#grad)"/>
  
  <!-- Small accent circle -->
  <circle cx="62" cy="30" r="4" fill="#39FF14"/>

  <!-- LOOK AHEAD text -->
  <text x="90" y="42" fill="url(#grad)" font-size="32" font-family="Inter, Arial, sans-serif" font-weight="800" letter-spacing="1" filter="url(#glow)">LOOK</text>
  <text x="90" y="68" fill="#B6FFAC" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="600" letter-spacing="2" opacity="0.85">PLANNER</text>
  
  <!-- Divider line -->
  <rect x="88" y="44" width="2" height="20" fill="#214526"/>
</svg>
