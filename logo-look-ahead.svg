<svg width="400" height="80" viewBox="0 0 400 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="50%" stop-color="#7DFF63"/>
      <stop offset="100%" stop-color="#39FF14"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Calendar icon - sharp modern design -->
  <g filter="url(#glow)">
    <!-- Calendar body -->
    <rect x="8" y="12" width="50" height="56" rx="6" stroke="url(#grad)" stroke-width="2.5" fill="rgba(13,20,16,0.9)"/>
    
    <!-- Calendar header bar -->
    <rect x="8" y="12" width="50" height="14" rx="6" fill="url(#grad)"/>
    <rect x="8" y="20" width="50" height="6" fill="url(#grad)"/>
    
    <!-- Calendar rings (3 rings) -->
    <rect x="16" y="6" width="4" height="12" rx="2" fill="url(#grad)"/>
    <rect x="31" y="6" width="4" height="12" rx="2" fill="url(#grad)"/>
    <rect x="46" y="6" width="4" height="12" rx="2" fill="url(#grad)"/>
    
    <!-- Calendar grid lines -->
    <line x1="8" y1="34" x2="58" y2="34" stroke="#214526" stroke-width="1"/>
    <line x1="8" y1="46" x2="58" y2="46" stroke="#214526" stroke-width="1"/>
    <line x1="25" y1="26" x2="25" y2="68" stroke="#214526" stroke-width="1"/>
    <line x1="41" y1="26" x2="41" y2="68" stroke="#214526" stroke-width="1"/>
    
    <!-- Highlighted day (today) -->
    <rect x="29" y="38" width="10" height="8" rx="2" fill="#39FF14" opacity="0.3"/>
    <circle cx="34" cy="42" r="3" fill="#39FF14"/>
    
    <!-- Arrow indicator (forward look) -->
    <path d="M44 54 L52 62 L44 62 L44 70 L36 62 L44 62 Z" fill="url(#grad)"/>
  </g>

  <!-- LOOK AHEAD text -->
  <text x="72" y="42" fill="url(#grad)" font-size="32" font-family="Inter, Arial, sans-serif" font-weight="800" letter-spacing="1" filter="url(#glow)">LOOK AHEAD</text>
  <text x="74" y="68" fill="#B6FFAC" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="600" letter-spacing="2" opacity="0.85">PLANNER</text>
  
  <!-- Divider line -->
  <rect x="70" y="44" width="2" height="20" fill="#214526"/>
</svg>